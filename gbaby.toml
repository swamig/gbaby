# GBaby unified configuration
# The Frankenstein of AI Coding

[quant]
# Compression backend: "auto" | "cuda" | "metal" | "cpu"
# "auto" detects CUDA -> Metal -> CPU at runtime
backend = "auto"
bits = 3                # 2-8, lower = more compression, 3 is the sweet spot
projections = 64        # randomized projection count
seed = 42               # deterministic reproducibility

[provider]
# LLM provider configuration.
# GBaby works with any OpenAI-compatible API endpoint.
#
# Examples:
#   Claude (default):   platform = "claude"
#   Self-hosted vLLM:   platform = "openai-compatible", base_url = "http://localhost:8000/v1"
#   Together AI:        platform = "openai-compatible", base_url = "https://api.together.xyz/v1"
#   Fireworks:          platform = "openai-compatible", base_url = "https://api.fireworks.ai/inference/v1"
#   Ollama:             platform = "openai-compatible", base_url = "http://localhost:11434/v1"
#
# For self-hosted vLLM with TurboQuant, start your server with:
#   vllm serve meta-llama/Llama-3.1-70B --kv-cache-dtype turboquant_k3v4
#
# Then point GBaby at it:
#   platform = "openai-compatible"
#   base_url = "http://localhost:8000/v1"
#   model = "meta-llama/Llama-3.1-70B"
platform = "claude"
# base_url = ""
# model = ""
# api_key_env = "OPENAI_API_KEY"   # env var name containing your API key

[brain]
# GBrain knowledge base path (relative to project root)
path = "brain"
# Auto-sync cron interval (minutes), 0 to disable
sync_interval = 30

[stack]
# GStack roles to activate
roles = [
  "ceo",
  "eng-manager",
  "designer",
  "qa",
  "release-manager",
  "doc-engineer",
]

[graph]
# Graphify knowledge graph settings
auto_sync = true
watch = true
# File patterns to index
include = ["**/*.rs", "**/*.ts", "**/*.tsx", "**/*.py", "**/*.md"]
exclude = ["node_modules/**", "target/**", "dist/**", ".git/**"]
